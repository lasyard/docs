apiVersion: v1
kind: Pod
metadata:
  name: vgpu
spec:
  schedulerName: volcano
  restartPolicy: OnFailure
  containers:
    - image: ubuntu:22.04
      imagePullPolicy: IfNotPresent
      name: vgpu-ubuntu
      command: ["sh", "-c", "trap exit INT TERM; sleep infinity & wait"]
      resources:
        requests:
          cpu: "1"
          memory: 1Gi
          volcano.sh/vgpu-number: "1"
          volcano.sh/vgpu-cores: "1"
          volcano.sh/vgpu-memory: "1000"
        limits:
          cpu: "1"
          memory: 1Gi
          volcano.sh/vgpu-number: "1"
          volcano.sh/vgpu-cores: "1"
          volcano.sh/vgpu-memory: "1000"
