apiVersion: v1
kind: Pod
metadata:
  name: cpu-dominant
spec:
  nodeName: las1
  schedulerName: volcano
  restartPolicy: OnFailure
  containers:
    - image: busybox:1.37.0-glibc
      imagePullPolicy: IfNotPresent
      name: main
      command: ["sh", "-c", "trap exit INT TERM; sleep infinity & wait"]
      resources:
        requests:
          cpu: "8"
          memory: 1Gi
          nvidia.com/gpu: "0"
        limits:
          cpu: "8"
          memory: 1Gi
          nvidia.com/gpu: "0"
