apiVersion: v1
kind: Pod
metadata:
  generateName: numa-
  labels:
    for: test
spec:
  tolerations:
  - key: "node.kubernetes.io/unschedulable"
    operator: "Equal"
    value: ""
    effect: "NoSchedule"
  nodeName: ccit-k8s-worker-gpu193
  restartPolicy: OnFailure
  containers:
    - image: ubuntu:22.04
      imagePullPolicy: IfNotPresent
      name: numa
      command: ["sh", "-c", "trap exit INT TERM; sleep infinity & wait"]
      resources:
        requests:
          cpu: "8"
          memory: 2Gi
        limits:
          cpu: "8"
          memory: 2Gi
