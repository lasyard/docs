apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: upload
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: k8s/upload-svc
    repoURL: git@github.com:lasyard/coding-go.git
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
