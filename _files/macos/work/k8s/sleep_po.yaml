apiVersion: v1
kind: Pod
metadata:
  name: sleep-po
spec:
  containers:
  - image: busybox
    imagePullPolicy: IfNotPresent
    name: busybox-sleep
    command: ['sh', '-c', 'trap exit INT TERM; sleep 1m & wait']
    resources:
      requests:
        cpu: 1
      limits:
        cpu: 1
  restartPolicy: OnFailure
