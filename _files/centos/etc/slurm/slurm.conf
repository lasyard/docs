# slurm.conf file generated by configurator easy.html.
# Put this file on all nodes of your cluster.
# See the slurm.conf man page for more information.
#
ClusterName=las
SlurmctldHost=las0
SlurmctldParameters=enable_configless
MaxNodeCount=100
AuthType=auth/munge
AuthAltTypes=auth/jwt
AuthAltParameters=jwt_key=/var/spool/slurm/ctld/jwt_hs256.key
#
#MailProg=/bin/mail
#MpiDefault=
#MpiParams=ports=#-#
ProctrackType=proctrack/cgroup
ReturnToService=1
SlurmctldPidFile=/var/run/slurm/ctld.pid
#SlurmctldPort=6817
SlurmdPidFile=/var/run/slurm/d-%h.pid
#SlurmdPort=6818
SlurmdSpoolDir=/var/spool/slurm/d-%h
SlurmUser=slurm
#SlurmdUser=root
StateSaveLocation=/var/spool/slurm/ctld
#SwitchType=
TaskPlugin=task/affinity,task/cgroup
#
#
# TIMERS
#KillWait=30
#MinJobAge=300
#SlurmctldTimeout=120
#SlurmdTimeout=300
#
#
# SCHEDULING
SchedulerType=sched/backfill
SelectType=select/cons_tres
#
#
# LOGGING AND ACCOUNTING
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=localhost
#JobAcctGatherFrequency=30
JobAcctGatherType=jobacct_gather/cgroup
#SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm/ctld.log
#SlurmdDebug=info
SlurmdLogFile=/var/log/slurm/d-%h.log
#
#
# COMPUTE NODES
PartitionName=DEFAULT MaxTime=INFINITE State=UP
PartitionName=normal Nodes=ALL Default=YES PriorityTier=1
PartitionName=high Nodes=ALL Default=NO PriorityTier=2
